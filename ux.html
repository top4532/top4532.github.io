
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Luxury Loading Screen</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0f172a,#1e3a8a,#0ea5e9);
  overflow:hidden;
}

/* Background Glow */
body::before,
body::after{
  content:'';
  position:absolute;
  width:400px;
  height:400px;
  border-radius:50%;
  filter:blur(120px);
  animation:float 8s ease-in-out infinite;
}

body::before{
  background:#38bdf8;
  top:-100px;
  left:-100px;
}

body::after{
  background:#6366f1;
  bottom:-100px;
  right:-100px;
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(30px);}
}

/* Loader Card */
.loader-box{
  position:relative;
  width:320px;
  padding:40px 30px;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.15);
  backdrop-filter:blur(20px);
  border-radius:28px;
  text-align:center;
  box-shadow:0 20px 50px rgba(0,0,0,.25);
}

/* Logo */
.logo{
  font-size:28px;
  font-weight:700;
  color:#fff;
  letter-spacing:1px;
  margin-bottom:10px;
}

.logo span{
  color:#38bdf8;
}

/* Text */
.loading-text{
  color:rgba(255,255,255,0.8);
  font-size:14px;
  margin-bottom:30px;
}

/* Circle Loader */
.circle-loader{
  width:90px;
  height:90px;
  border-radius:50%;
  border:4px solid rgba(255,255,255,0.1);
  border-top:4px solid #38bdf8;
  margin:auto;
  animation:spin 1s linear infinite;
  position:relative;
}

.circle-loader::after{
  content:'';
  position:absolute;
  top:50%;
  left:50%;
  width:16px;
  height:16px;
  background:#38bdf8;
  border-radius:50%;
  transform:translate(-50%,-50%);
  box-shadow:0 0 20px #38bdf8;
}

@keyframes spin{
  100%{transform:rotate(360deg);}
}

/* Progress */
.progress{
  margin-top:30px;
  width:100%;
  height:8px;
  background:rgba(255,255,255,0.08);
  border-radius:20px;
  overflow:hidden;
}

.progress span{
  display:block;
  width:0%;
  height:100%;
  background:linear-gradient(90deg,#38bdf8,#0ea5e9,#6366f1);
  border-radius:20px;
  animation:load 3s ease forwards infinite;
}

@keyframes load{
  0%{width:0%;}
  100%{width:100%;}
}

/* Percent */
.percent{
  margin-top:12px;
  color:#fff;
  font-size:13px;
  opacity:0.8;
  letter-spacing:1px;
}
</style>
</head>

<body>

<div class="loader-box">
  <div class="logo">Kiw<span>Loading</span></div>
  <div class="loading-text">กำลังโหลดระบบ กรุณารอสักครู่...</div>

  <div class="circle-loader"></div>

  <div class="progress">
    <span></span>
  </div>

  <div class="percent">Loading...</div>
</div>
<script>
setTimeout(() => {
   window.location.href = "ux1.html";
}, 3000);
</script>
</body>
</html>
