<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTS Simulator</title>
<style>
body{font-family:Arial,sans-serif;background:#0f172a;color:#fff;margin:0;padding:20px}.wrap{max-width:1100px;margin:auto}.line{position:relative;height:8px;background:#334155;border-radius:10px;margin:60px 0}.station{position:absolute;top:-18px;transform:translateX(-50%);text-align:center}.dot{width:18px;height:18px;background:#94a3b8;border-radius:50%;margin:auto;border:3px solid #0f172a}.station.active .dot{background:#22c55e;box-shadow:0 0 15px #22c55e}.station span{display:block;margin-top:8px;font-size:12px;width:80px;margin-left:-31px}.train{position:absolute;top:-22px;width:46px;height:28px;background:#38bdf8;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;transition:left 1s linear}.panel{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}.card{background:#111827;padding:16px;border-radius:16px}.btn{padding:10px 14px;border:0;border-radius:10px;background:#2563eb;color:#fff;cursor:pointer}.btn:disabled{opacity:.5}.status{font-size:18px;color:#93c5fd}
</style>
</head>
<body>
<div class='wrap'>
<h1>🚆 ระบบจำลองรถไฟฟ้า BTS</h1>
<div class='panel'>
<div class='card'><div>สถานะ</div><div class='status' id='status'>พร้อมออกเดินทาง</div></div>
<div class='card'><div>สถานีปัจจุบัน</div><div class='status' id='current'>หมอชิต</div></div>
<div class='card'><button class='btn' onclick='start()'>เริ่มเดินรถ</button> <button class='btn' onclick='stopTrain()'>หยุด</button></div>
</div>
<div class='line' id='line'>
<div class='train' id='train'>🚆</div>
</div>
</div>
<script>
const stations=['หมอชิต','สะพานควาย','อารีย์','สนามเป้า','อนุสาวรีย์','พญาไท','สยาม'];
const line=document.getElementById('line');
const train=document.getElementById('train');
const statusEl=document.getElementById('status');
const currentEl=document.getElementById('current');
let idx=0,timer=null;
stations.forEach((name,i)=>{const s=document.createElement('div');s.className='station';s.style.left=(i/(stations.length-1)*100)+'%';s.innerHTML='<div class="dot"></div><span>'+name+'</span>';line.appendChild(s);});
function render(){document.querySelectorAll('.station').forEach((el,i)=>el.classList.toggle('active',i===idx));train.style.left=`calc(${idx/(stations.length-1)*100}% - 23px)`;currentEl.textContent=stations[idx];statusEl.textContent='จอดที่ '+stations[idx];}
function move(){idx++;if(idx>=stations.length) idx=0;statusEl.textContent='กำลังวิ่งไป '+stations[idx];setTimeout(render,900);} 
function start(){if(timer) return;render();timer=setInterval(move,2500);statusEl.textContent='เริ่มให้บริการ';}
function stopTrain(){clearInterval(timer);timer=null;statusEl.textContent='หยุดให้บริการ';}
render();
</script>
</body>
</html>
