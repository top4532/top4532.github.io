
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Electrical Simulator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Segoe UI,Arial,sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:center;background:radial-gradient(circle at top,#1e3a8a,#020617 60%);overflow:hidden;color:#fff}
body:before,body:after{content:'';position:absolute;border-radius:50%;filter:blur(80px);opacity:.35}
body:before{width:260px;height:260px;background:#38bdf8;top:-60px;left:-60px}
body:after{width:300px;height:300px;background:#8b5cf6;bottom:-80px;right:-80px}
.panel{position:relative;width:460px;padding:28px;border-radius:28px;background:rgba(15,23,42,.72);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.12);box-shadow:0 20px 60px rgba(0,0,0,.45)}
h1{font-size:28px;font-weight:700;letter-spacing:.5px;text-align:center;margin-bottom:18px}
.sub{text-align:center;color:#cbd5e1;font-size:13px;margin-bottom:20px}
.row{margin:16px 0}
label{display:flex;justify-content:space-between;margin-bottom:8px;font-size:14px;color:#e2e8f0}
input[type=range]{width:100%;appearance:none;height:8px;border-radius:99px;background:linear-gradient(90deg,#38bdf8,#8b5cf6);outline:none}
input[type=range]::-webkit-slider-thumb{appearance:none;width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 0 15px rgba(255,255,255,.8);cursor:pointer}
button{width:100%;padding:14px;border:0;border-radius:16px;background:linear-gradient(135deg,#38bdf8,#6366f1);color:#fff;font-weight:700;font-size:15px;cursor:pointer;transition:.25s;box-shadow:0 10px 25px rgba(59,130,246,.35)}
button:hover{transform:translateY(-2px) scale(1.01)}
.light-wrap{display:flex;justify-content:center;align-items:center;padding:14px 0}
.light{width:120px;height:120px;border-radius:50%;background:#111827;transition:.35s;border:4px solid rgba(255,255,255,.08)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
.card{padding:14px;border-radius:18px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08)}
.card small{display:block;color:#94a3b8;margin-bottom:6px}
.card span{font-size:22px;font-weight:700}
.status{margin-top:12px;text-align:center;padding:10px;border-radius:14px;background:rgba(255,255,255,.05)}
</style>
</head>
<body>
<div class='panel'>
<h1>⚡ ระบบจำลองไฟฟ้า</h1>
<div class='sub'>Modern Interactive Power Simulation</div>
<div class='row'>
<label><span>แรงดันไฟฟ้า (V)</span><strong id='vText'>220</strong></label>
<input id='voltage' type='range' min='0' max='240' value='220'>
</div>
<div class='row'>
<label><span>ความต้านทาน (Ω)</span><strong id='rText'>100</strong></label>
<input id='resistance' type='range' min='1' max='500' value='100'>
</div>
<div class='row'><button onclick='togglePower()'>เปิด / ปิด ระบบ</button></div>
<div class='light-wrap'><div id='lamp' class='light'></div></div>
<div class='grid'>
<div class='card'><small>กระแสไฟฟ้า</small><span id='current'>0</span> A</div>
<div class='card'><small>กำลังไฟฟ้า</small><span id='power'>0</span> W</div>
</div>
<div class='status'>สถานะ: <strong id='status'>ปิด</strong></div>
</div>
<script>
let on=false;
const voltage=document.getElementById('voltage');
const resistance=document.getElementById('resistance');
function togglePower(){on=!on;update();}
function update(){
const V=+voltage.value,R=+resistance.value;
vText.textContent=V;rText.textContent=R;
let I=0,P=0;
if(on){I=V/R;P=V*I;}
current.textContent=I.toFixed(2);
power.textContent=P.toFixed(2);
status.textContent=on?'เปิด':'ปิด';
const lamp=document.getElementById('lamp');
if(on){let glow=Math.min(1,P/500);lamp.style.background=`radial-gradient(circle,#fff176,#facc15,#f59e0b)`;lamp.style.boxShadow=`0 0 ${40+glow*80}px rgba(250,204,21,.95),0 0 ${80+glow*120}px rgba(251,191,36,.55)`;}
else{lamp.style.background='#111827';lamp.style.boxShadow='none';}
}
voltage.oninput=update;resistance.oninput=update;update();
</script>
</body>
</html>
