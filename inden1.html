<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Website - โชว์ผลงาน</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#eff6ff,#dbeafe,#eef2ff);
}
.sidebar{
    background:linear-gradient(180deg,#1e3a8a,#2563eb,#7c3aed);
}
.card:hover{
    transform:translateY(-8px);
    box-shadow:0 20px 40px rgba(0,0,0,0.15);
}
</style>
</head>
<body class="flex min-h-screen">

<!-- Sidebar -->
<aside class="sidebar w-72 text-white p-6 shadow-2xl">
    <h1 class="text-3xl font-bold mb-10">My Website</h1>

    <nav class="space-y-4 text-lg">
        <a href="#" class="block px-4 py-3 rounded-xl bg-white/20 hover:bg-white/30 transition">🏠 หน้าแรก</a>
        <a href="#" class="block px-4 py-3 rounded-xl hover:bg-white/20 transition">🎨 โชว์ผลงาน</a>
        <a href="#" class="block px-4 py-3 rounded-xl hover:bg-white/20 transition">👤 เกี่ยวกับฉัน</a>
        <a href="#" class="block px-4 py-3 rounded-xl hover:bg-white/20 transition">📩 ติดต่อ</a>
    </nav>

    <div class="mt-12 p-4 bg-white/10 rounded-2xl">
        <p class="text-sm text-blue-100">Portfolio Design 2026</p>
    </div>
</aside>

<!-- Main Content -->
<main class="flex-1 p-10">
    <header class="mb-10">
        <h2 class="text-4xl font-bold text-gray-800">โชว์ผลงาน</h2>
        <p class="text-gray-500 mt-2">รวมผลงานการออกแบบและพัฒนาเว็บไซต์</p>
    </header>

    <!-- Cards -->
    <section class="grid md:grid-cols-2 xl:grid-cols-3 gap-8">
        <div class="card bg-white rounded-3xl p-6 shadow-lg transition duration-300">
            <div class="h-40 bg-gradient-to-r from-blue-500 to-cyan-400 rounded-2xl mb-5"></div>
            <h3 class="text-xl font-bold text-gray-800 mb-2">UI Dashboard</h3>
            <p class="text-gray-500">ออกแบบระบบแดชบอร์ดสมัยใหม่ ใช้งานง่าย</p>
        </div>

        <div class="card bg-white rounded-3xl p-6 shadow-lg transition duration-300">
            <div class="h-40 bg-gradient-to-r from-purple-500 to-pink-400 rounded-2xl mb-5"></div>
            <h3 class="text-xl font-bold text-gray-800 mb-2">Login Page</h3>
            <p class="text-gray-500">หน้าล็อกอินหรูหรา พร้อม Animation</p>
        </div>

        <div class="card bg-white rounded-3xl p-6 shadow-lg transition duration-300">
            <div class="h-40 bg-gradient-to-r from-green-500 to-emerald-400 rounded-2xl mb-5"></div>
            <h3 class="text-xl font-bold text-gray-800 mb-2">Portfolio Website</h3>
            <p class="text-gray-500">เว็บไซต์แนะนำตัวพร้อมโชว์ผลงาน</p>
        </div>
    </section>
</main>

</body>
</html>
