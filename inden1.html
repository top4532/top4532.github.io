
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>หน้าเว็บส่วนหัว</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#e0f2fe,#dbeafe,#eef2ff);
}
.hero-bg{
    background:linear-gradient(135deg,#2563eb,#1d4ed8,#7c3aed);
}
</style>
</head>
<body>

<!-- Header -->
<header class="hero-bg text-white shadow-xl">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
        <h1 class="text-3xl font-bold tracking-wide">My Website</h1>

        <nav class="hidden md:flex gap-8 text-lg">
            <a href="#" class="hover:text-blue-200 transition">หน้าแรก</a>
            <a href="#" class="hover:text-blue-200 transition">เกี่ยวกับ</a>
            <a href="#" class="hover:text-blue-200 transition">บริการ</a>
            <a href="#" class="hover:text-blue-200 transition">ติดต่อ</a>
        </nav>

        <button class="bg-white text-blue-700 px-5 py-2 rounded-xl font-semibold hover:scale-105 transition">
            เริ่มต้นใช้งาน
        </button>
    </div>
</header>

<!-- Hero Section -->
<section class="text-center py-28 px-6">
    <h2 class="text-5xl font-bold text-gray-800 mb-6">ยินดีต้อนรับสู่เว็บไซต์</h2>
    <p class="text-lg text-gray-600 max-w-2xl mx-auto mb-8">
        นี่คือตัวอย่างหน้าเว็บเปล่า ๆ ที่มีส่วนหัวสวยงาม พร้อมนำไปต่อยอดได้ทันที
    </p>
    <button class="bg-blue-600 text-white px-8 py-3 rounded-xl shadow-lg hover:bg-blue-700 transition">
        ดูเพิ่มเติม
    </button>
</section>

</body>
</html>
